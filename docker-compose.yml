version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: mydb
      POSTGRES_PASSWORD: mypassword
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:mypassword@postgres/mydb
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    environment:
      # Важно: здесь теперь не нужно указывать порт 5000, 
      # так как Nginx всё проксирует через /api
      VITE_API_URL: /api 
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
