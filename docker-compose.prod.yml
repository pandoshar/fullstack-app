version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: mydb_prod
      POSTGRES_PASSWORD: prod_password
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:prod_password@postgres/mydb_prod
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: /api
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - '80:80' # Продакшн будет на стандартном 80 порту
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

volumes:
  postgres_prod_data:
