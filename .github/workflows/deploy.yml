name: Multi-Environment Deploy
on:
  push:
    branches: [develop] # Этот воркфлоу следит ТОЛЬКО за develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: pandoshar
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/fullstack-app
            git config pull.rebase false
            git fetch origin
            git checkout develop
            git pull origin develop --no-rebase
            
            # Принудительно запускаем именно staging-файл с именем проекта staging
            sudo ~/.docker/cli-plugins/docker-compose -p fullstack-staging -f docker-compose.staging.yml up -d --build
