version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: mydb_staging
      POSTGRES_PASSWORD: staging_password
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:staging_password@postgres/mydb_staging
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: /api
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - '8080:80' # Стейджинг будет доступен по порту 8080
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

volumes:
  postgres_staging_data:
