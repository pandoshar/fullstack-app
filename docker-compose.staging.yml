version: '3.8'

services:
  postgres-staging:
    image: postgres:15
    container_name: fullstack-staging-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SecretStaging123
      POSTGRES_DB: fullstack_staging
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - staging-network

  backend-staging:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fullstack-staging-backend
    environment:
      - DATABASE_URL=postgresql://postgres:SecretStaging123@postgres-staging:5432/fullstack_staging
      - FLASK_ENV=development
    depends_on:
      - postgres-staging
    networks:
      - staging-network

  frontend-staging:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fullstack-staging-frontend
    networks:
      - staging-network

  nginx-staging:
    image: nginx:alpine
    container_name: fullstack-staging-nginx
    ports:
      - "8080:80"  # СНАРУЖИ СТРОГО 8080! Порт 80 трогать нельзя, он для main!
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend-staging
      - backend-staging
    networks:
      - staging-network

volumes:
  postgres_staging_data:

networks:
  staging-network:
